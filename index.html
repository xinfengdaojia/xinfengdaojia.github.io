<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新风到家</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        .carousel {
            width: 100vw;
            height: 100vh;
            position: relative;
            overflow: hidden;
            background: #000;
        }
        .carousel-list {
            display: flex;
            height: 100%;
            transition: transform 0.8s ease;
        }
        .carousel-item {
            flex: 0 0 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* 🔥 关键：窗口缩放也能显示完整图片 */
        .carousel-item img {
            width: 100%;
            height: auto;
            max-height: 100%;
            object-fit: contain;
            display: block;
        }
    </style>
</head>
<body>

<div class="carousel">
    <div class="carousel-list">
        <div class="carousel-item"><img src="1.jpg" alt=""></div>
        <div class="carousel-item"><img src="2.jpg" alt=""></div>
        <div class="carousel-item"><img src="3.jpg" alt=""></div>
        <div class="carousel-item"><img src="4.jpg" alt=""></div>
        <div class="carousel-item"><img src="5.jpg" alt=""></div>
        <div class="carousel-item"><img src="6.jpg" alt=""></div>
    </div>
</div>

<script>
    const list = document.querySelector('.carousel-list');
    const items = document.querySelectorAll('.carousel-item');
    const total = items.length;
    let index = 0;

    function play() {
        index = (index + 1) % total;
        list.style.transform = `translateX(-${index * 100}%)`;
    }
    setInterval(play, 5000);
</script>
</body>
</html>
